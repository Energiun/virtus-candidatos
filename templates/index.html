<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtus Exec — Busca de Candidatos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f4f7fb; min-height: 100vh; }

    header {
      background: #1a3a5c;
      padding: 24px 32px;
      color: white;
    }
    header h1 { font-size: 22px; letter-spacing: 3px; font-weight: 700; }
    header p { color: #a8c4e0; font-size: 12px; margin-top: 4px; letter-spacing: 1px; }

    .container { max-width: 900px; margin: 32px auto; padding: 0 20px; }

    .card {
      background: white;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #1a3a5c;
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e8eef5;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    label { display: block; font-size: 11px; font-weight: 700; color: #555; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e8f0;
      border-radius: 8px;
      font-size: 14px;
      color: #1a3a5c;
      background: #f8fafc;
      transition: border-color 0.2s;
      outline: none;
    }
    input[type="text"]:focus { border-color: #1a3a5c; background: white; }
    input[type="text"]::placeholder { color: #b0bec5; }

    .required-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: #e53e3e;
      border-radius: 50%;
      margin-left: 4px;
      vertical-align: middle;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 8px;
    }

    button {
      background: #1a3a5c;
      color: white;
      border: none;
      padding: 14px 36px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #24527a; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #90a4ae; cursor: not-allowed; transform: none; }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
    }
    .checkbox-label input { width: 16px; height: 16px; accent-color: #1a3a5c; cursor: pointer; }

    /* Resultados */
    #status {
      text-align: center;
      padding: 16px;
      font-size: 14px;
      color: #555;
      display: none;
    }
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid #e0e8f0;
      border-top-color: #1a3a5c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #resultados { display: none; }

    .resultado-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .resultado-header h2 { font-size: 14px; font-weight: 700; color: #1a3a5c; letter-spacing: 1px; }
    .total-badge {
      background: #1a3a5c;
      color: white;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }

    .candidato {
      background: white;
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: 16px;
      align-items: start;
      transition: box-shadow 0.2s;
    }
    .candidato:hover { box-shadow: 0 4px 16px rgba(26,58,92,0.12); }

    .rank {
      font-size: 18px;
      font-weight: 700;
      color: #c5d5e5;
      padding-top: 2px;
      text-align: center;
    }
    .rank.top { color: #1a3a5c; }

    .info-nome {
      font-size: 16px;
      font-weight: 700;
      color: #1a3a5c;
      margin-bottom: 3px;
    }

    .info-cargo {
      font-size: 13px;
      color: #444;
      margin-bottom: 3px;
    }

    .info-cidade {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }

    .tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag {
      background: #e8eef5;
      color: #1a3a5c;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .tag.green { background: #dcfce7; color: #15803d; }
    .tag.gold { background: #fef3c7; color: #92400e; }

    .score-col {
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }
    .score-badge {
      background: #1a3a5c;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .ver-perfil {
      color: #1a3a5c;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      border: 1.5px solid #1a3a5c;
      padding: 5px 14px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .ver-perfil:hover { background: #1a3a5c; color: white; }

    .email-ok {
      background: #dcfce7;
      color: #15803d;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
      display: none;
    }

    @media (max-width: 600px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .candidato { grid-template-columns: 28px 1fr; }
      .score-col { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>VIRTUS EXEC</h1>
  <p>BUSCA INTELIGENTE DE CANDIDATOS</p>
</header>

<div class="container">
  <div class="card">
    <div class="section-title">Filtros obrigatórios <span class="required-dot"></span></div>
    <div class="grid-2">
      <div>
        <label>Cargo <span class="required-dot"></span></label>
        <input type="text" id="cargo" placeholder="ex: Consultor de Vendas">
      </div>
      <div>
        <label>Cidade <span class="required-dot"></span></label>
        <input type="text" id="cidade" placeholder="ex: Paulínia">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Filtros opcionais</div>
    <div class="grid-3">
      <div>
        <label>Idioma</label>
        <input type="text" id="idioma" placeholder="ex: inglês">
      </div>
      <div>
        <label>Habilidades</label>
        <input type="text" id="habilidades" placeholder="ex: SAP, vendas B2B">
      </div>
      <div>
        <label>Empresa (passada)</label>
        <input type="text" id="empresa" placeholder="ex: Wizard">
      </div>
    </div>
  </div>

  <div class="actions">
    <button id="btnBuscar" onclick="buscar()">🔍 BUSCAR CANDIDATOS</button>
    <label class="checkbox-label">
      <input type="checkbox" id="enviarEmail">
      Enviar resultado por e-mail
    </label>
  </div>

  <div id="status"></div>

  <div id="resultados">
    <div id="emailOk" class="email-ok">✅ Resultado enviado para ti@virtusexec.com.br</div>
    <div class="resultado-header">
      <h2>CANDIDATOS RANQUEADOS</h2>
      <span class="total-badge" id="totalBadge">0 encontrados</span>
    </div>
    <div id="lista"></div>
  </div>
</div>

<script>
async function buscar() {
  const cargo = document.getElementById("cargo").value.trim();
  const cidade = document.getElementById("cidade").value.trim();

  if (!cargo || !cidade) {
    alert("Cargo e cidade são obrigatórios.");
    return;
  }

  const btn = document.getElementById("btnBuscar");
  btn.disabled = true;
  btn.textContent = "Buscando...";

  const status = document.getElementById("status");
  status.style.display = "block";
  status.innerHTML = '<span class="spinner"></span> Buscando no LinkedIn via Apify... isso pode levar até 2 minutos.';

  document.getElementById("resultados").style.display = "none";
  document.getElementById("emailOk").style.display = "none";
  document.getElementById("lista").innerHTML = "";

  try {
    const resp = await fetch("/buscar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        cargo,
        cidade,
        idioma: document.getElementById("idioma").value.trim(),
        habilidades: document.getElementById("habilidades").value.trim(),
        empresa: document.getElementById("empresa").value.trim(),
        enviar_email: document.getElementById("enviarEmail").checked
      })
    });

    const data = await resp.json();

    status.style.display = "none";
    btn.disabled = false;
    btn.textContent = "🔍 BUSCAR CANDIDATOS";

    if (!data.ok) {
      alert("Erro: " + data.mensagem);
      return;
    }

    document.getElementById("resultados").style.display = "block";
    document.getElementById("totalBadge").textContent = data.total + " encontrado" + (data.total !== 1 ? "s" : "");

    if (data.email_enviado) {
      document.getElementById("emailOk").style.display = "block";
    }

    const lista = document.getElementById("lista");
    if (data.candidatos.length === 0) {
      lista.innerHTML = '<p style="text-align:center;color:#888;padding:32px;">Nenhum candidato encontrado para esse filtro.</p>';
      return;
    }

    data.candidatos.forEach((c, i) => {
      const rank = i + 1;
      const rankClass = rank <= 3 ? "rank top" : "rank";
      const openToWork = c.open_to_work ? '<span class="tag green">✓ Open to Work</span>' : '';
      const tags = c.motivos.map(m => `<span class="tag">${m}</span>`).join("");
      const resumo = c.resumo ? `<p style="font-size:12px;color:#888;margin-top:6px;line-height:1.5;">${c.resumo}</p>` : "";

      lista.innerHTML += `
        <div class="candidato">
          <div class="${rankClass}">${rank}</div>
          <div>
            <div class="info-nome">${c.nome}</div>
            <div class="info-cargo">${c.cargo_atual || "—"}</div>
            <div class="info-cidade">📍 ${c.cidade || "—"}</div>
            <div class="tags">${openToWork}${tags}</div>
            ${resumo}
          </div>
          <div class="score-col">
            <span class="score-badge">${c.score} pts</span>
            <a href="${c.link}" target="_blank" class="ver-perfil">Ver perfil →</a>
          </div>
        </div>`;
    });

  } catch (err) {
    status.style.display = "none";
    btn.disabled = false;
    btn.textContent = "🔍 BUSCAR CANDIDATOS";
    alert("Erro de conexão: " + err.message);
  }
}

document.querySelectorAll("input").forEach(input => {
  input.addEventListener("keypress", e => {
    if (e.key === "Enter") buscar();
  });
});
</script>
</body>
</html>
